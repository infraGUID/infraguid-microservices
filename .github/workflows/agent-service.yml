name: CI/CD - agent-service

on:
  # TEMPORARILY DISABLED — EKS cluster is offline. Re-enable (uncomment) to
  # resume building/publishing images and deploying via Argo CD.
  # push:
  #   branches: [main]
  #   paths:
  #     - "services/agent-service/**"
  #     - "shared/**"
  #     - ".github/workflows/agent-service.yml"
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "services/agent-service/**"
  #     - "shared/**"
  #     - ".github/workflows/agent-service.yml"
  workflow_dispatch:  # Manual trigger only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  # ───────────── PR — sequential: lint → sca → trivy ─────────────
  lint:
    if: github.event_name == 'pull_request'
    uses: infraGUID/infraguid-workflows/.github/workflows/_lint.yml@main
    with:
      service-path: services/agent-service
      runtime: python

  sca:
    needs: [lint]
    if: github.event_name == 'pull_request'
    uses: infraGUID/infraguid-workflows/.github/workflows/_sca.yml@main
    with:
      service-name: agent-service
      service-path: services/agent-service
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy:
    needs: [sca]
    if: github.event_name == 'pull_request'
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-build.yml@main
    with:
      service-name: agent-service
      dockerfile: services/agent-service/Dockerfile
      context: .

  pr-check:
    name: PR Quality Gate
    needs: [trivy]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"

  # ───────────── Push to main — build, publish & deploy ─────────────
  prepare:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  publish:
    needs: [prepare]
    if: github.event_name == 'push'
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-publish.yml@main
    with:
      image-name: infragui/agent-service
      tag: ${{ needs.prepare.outputs.sha }}
      dockerfile: services/agent-service/Dockerfile
      context: .

  cd:
    needs: [prepare, publish]
    if: needs.publish.result == 'success'
    uses: infraGUID/infraguid-workflows/.github/workflows/_cd.yml@main
    with:
      chart: agent-service
      image-tag: ${{ needs.prepare.outputs.sha }}
    secrets:
      ARGOCD_DEPLOY_TOKEN: ${{ secrets.ARGOCD_DEPLOY_TOKEN }}
