name: CI/CD - agent-service

on:
  pull_request:
    branches: [main]
    paths:
      - "services/agent-service/**"
      - ".github/workflows/agent-service.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  version-check:
    if: github.event_name == 'workflow_dispatch'
    uses: infraGUID/infraguid-workflows/.github/workflows/_version-check.yml@main
    with:
      service-name: agent-service
      version: ${{ inputs.version }}


  sast:
    if: github.event_name == 'pull_request'
    uses: infraGUID/infraguid-workflows/.github/workflows/_sast.yml@main
    with:
      service-path: services/agent-service
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca:
    if: github.event_name == 'pull_request'
    needs: [sast]
    uses: infraGUID/infraguid-workflows/.github/workflows/_sca.yml@main
    with:
      service-name: agent-service
      service-path: services/agent-service
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy:
    if: github.event_name == 'pull_request'
    needs: [sca]
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-build.yml@main
    with:
      service-name: agent-service
      dockerfile: services/agent-service/Dockerfile
      context: .


  notify-sast:
    if: ${{ always() && github.event_name == 'pull_request' && needs.sast.outputs.quality-gate-failed == 'true' }}
    needs: [sast]
    uses: infraGUID/infraguid-workflows/.github/workflows/_notify.yml@main
    with:
      subject: "[SAST] SonarCloud quality gate failed — agent-service"
      body: "The SonarCloud SAST quality gate failed on this pull request. Review the findings in SonarCloud before merging."
      service-name: agent-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

  notify-sca:
    if: ${{ always() && github.event_name == 'pull_request' && (needs.sca.outputs.critical-found == 'true' || needs.sca.result == 'failure') }}
    needs: [sca]
    uses: infraGUID/infraguid-workflows/.github/workflows/_notify.yml@main
    with:
      subject: "[Snyk] Critical dependency vulnerabilities — agent-service"
      body: "Snyk SCA found CRITICAL dependency vulnerabilities on this pull request. Review and remediate before merging."
      service-name: agent-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

 
  pr-comment:
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [sast, sca, trivy]
    uses: infraGUID/infraguid-workflows/.github/workflows/_pr-comment.yml@main
    with:
      service-name: agent-service
      sast: ${{ needs.sast.result }}
      sca: ${{ needs.sca.result }}
      trivy: ${{ needs.trivy.result }}


  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: [version-check]
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-publish.yml@main
    with:
      image-name: infragui/agent-service
      tag: v${{ inputs.version }}
      dockerfile: services/agent-service/Dockerfile
      context: .

  tag:
    if: github.event_name == 'workflow_dispatch'
    needs: [publish]
    uses: infraGUID/infraguid-workflows/.github/workflows/_tag.yml@main
    with:
      service-name: agent-service
      version: ${{ inputs.version }}

  cd:
    if: ${{ github.event_name == 'workflow_dispatch' && needs.publish.result == 'success' }}
    needs: [publish, tag]
    uses: infraGUID/infraguid-workflows/.github/workflows/_cd.yml@main
    with:
      chart: agent-service
      image-tag: v${{ inputs.version }}
    secrets:
      ARGOCD_DEPLOY_TOKEN: ${{ secrets.ARGOCD_DEPLOY_TOKEN }}
