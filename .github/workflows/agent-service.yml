name: CI/CD - agent-service

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  sast:
    uses: infraGUID/infraguid-workflows/.github/workflows/_sast.yml@main
    with:
      service-path: services/agent-service
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca:
    needs: [sast]
    uses: infraGUID/infraguid-workflows/.github/workflows/_sca.yml@main
    with:
      service-name: agent-service
      service-path: services/agent-service
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy:
    needs: [sca]
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-build.yml@main
    with:
      service-name: agent-service
      dockerfile: services/agent-service/Dockerfile
      context: .

  publish:
    needs: [trivy]
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-publish.yml@main
    with:
      image-name: infragui/agent-service
      tag: v${{ inputs.version }}
      push-latest: true
      dockerfile: services/agent-service/Dockerfile
      context: .

  cd:
    needs: [publish]
    if: needs.publish.result == 'success'
    uses: infraGUID/infraguid-workflows/.github/workflows/_cd.yml@main
    with:
      chart: agent-service
      image-tag: v${{ inputs.version }}
    secrets:
      ARGOCD_DEPLOY_TOKEN: ${{ secrets.ARGOCD_DEPLOY_TOKEN }}
