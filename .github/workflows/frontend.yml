name: CI/CD - frontend

# Pull request to main  -> validate only (SAST -> build image + Trivy), then post
#                          a summary comment. Nothing is published.
# Merge to main         -> nothing runs (no push trigger by design).
# workflow_dispatch     -> the only path that publishes: version guard -> the same
#                          validation -> push image to ECR -> push git tag -> CD ->
#                          CloudFront invalidation.
on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  # ───────────────── release guard (dispatch only) ─────────────────
  version-check:
    if: github.event_name == 'workflow_dispatch'
    uses: infraGUID/infraguid-workflows/.github/workflows/_version-check.yml@main
    with:
      service-name: frontend
      version: ${{ inputs.version }}

  # ───────────────── validation (PR only) ─────────────────
  sast:
    if: github.event_name == 'pull_request'
    uses: infraGUID/infraguid-workflows/.github/workflows/_sast.yml@main
    with:
      service-path: frontend
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy:
    if: github.event_name == 'pull_request'
    needs: [sast]
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-build.yml@main
    with:
      service-name: frontend
      dockerfile: frontend/Dockerfile
      context: .

  # ───────────────── security alerts (PR only, on findings) ─────────────────
  notify-sast:
    if: ${{ always() && github.event_name == 'pull_request' && needs.sast.outputs.quality-gate-failed == 'true' }}
    needs: [sast]
    uses: infraGUID/infraguid-workflows/.github/workflows/_notify.yml@main
    with:
      subject: "[SAST] SonarCloud quality gate failed — frontend"
      body: "The SonarCloud SAST quality gate failed on this pull request. Review the findings in SonarCloud before merging."
      service-name: frontend
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

  # ───────────────── PR comment (PR only) ─────────────────
  pr-comment:
    if: ${{ always() && github.event_name == 'pull_request' }}
    needs: [sast, trivy]
    uses: infraGUID/infraguid-workflows/.github/workflows/_pr-comment.yml@main
    with:
      service-name: frontend
      sast: ${{ needs.sast.result }}
      trivy: ${{ needs.trivy.result }}

  # ───────────────── publish + release (dispatch only) ─────────────────
  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: [version-check]
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-publish.yml@main
    with:
      image-name: infragui/frontend
      tag: v${{ inputs.version }}
      dockerfile: frontend/Dockerfile
      context: .

  tag:
    if: github.event_name == 'workflow_dispatch'
    needs: [publish]
    uses: infraGUID/infraguid-workflows/.github/workflows/_tag.yml@main
    with:
      service-name: frontend
      version: ${{ inputs.version }}

  cd:
    if: ${{ github.event_name == 'workflow_dispatch' && needs.publish.result == 'success' }}
    needs: [publish, tag]
    uses: infraGUID/infraguid-workflows/.github/workflows/_cd.yml@main
    with:
      chart: frontend
      image-tag: v${{ inputs.version }}
    secrets:
      ARGOCD_DEPLOY_TOKEN: ${{ secrets.ARGOCD_DEPLOY_TOKEN }}

  # Asset filenames are not content-hashed, so flush the CDN edge after a deploy
  # to guarantee users get the new build. The distribution is found by its domain
  # alias at runtime — no stored distribution ID needed. Reuses the same OIDC role
  # (AWS_DEPLOY_ROLE_ARN) the infra pipeline uses; it manages the distribution, so
  # it already has cloudfront permissions.
  invalidate:
    needs: [cd]
    if: needs.cd.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      APP_DOMAIN: nutritrack360.in
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items[?@=='${APP_DOMAIN}']].Id | [0]" \
            --output text)"
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "No CloudFront distribution found for ${APP_DOMAIN}; skipping invalidation."
            exit 0
          fi
          echo "Invalidating distribution $DIST_ID"
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
