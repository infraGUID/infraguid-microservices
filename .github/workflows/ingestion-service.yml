name: CI/CD - ingestion-service

on:
  push:
    branches: [main]
    paths:
      - "services/ingestion-service/**"
      - "shared/**"
      - ".github/workflows/ingestion-service.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/ingestion-service/**"
      - "shared/**"
      - ".github/workflows/ingestion-service.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  # ───────────── PR — sequential: lint → sca → trivy ─────────────
  lint:
    if: github.event_name == 'pull_request'
    uses: infraGUID/infraguid-workflows/.github/workflows/_lint.yml@main
    with:
      service-path: services/ingestion-service
      runtime: python

  sca:
    needs: [lint]
    if: github.event_name == 'pull_request'
    uses: infraGUID/infraguid-workflows/.github/workflows/_sca.yml@main
    with:
      service-name: ingestion-service
      service-path: services/ingestion-service
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  trivy:
    needs: [sca]
    if: github.event_name == 'pull_request'
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-build.yml@main
    with:
      service-name: ingestion-service
      dockerfile: services/ingestion-service/Dockerfile
      context: .

  pr-check:
    name: PR Quality Gate
    needs: [trivy]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"

  # ───────────── Push to main — build, publish & deploy ─────────────
  prepare:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.short }}
    steps:
      - id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  publish:
    needs: [prepare]
    if: github.event_name == 'push'
    uses: infraGUID/infraguid-workflows/.github/workflows/_docker-publish.yml@main
    with:
      image-name: infragui/ingestion-service
      tag: ${{ needs.prepare.outputs.sha }}
      dockerfile: services/ingestion-service/Dockerfile
      context: .

  cd:
    needs: [prepare, publish]
    if: needs.publish.result == 'success'
    uses: infraGUID/infraguid-workflows/.github/workflows/_cd.yml@main
    with:
      chart: ingestion-service
      image-tag: ${{ needs.prepare.outputs.sha }}
    secrets:
      ARGOCD_DEPLOY_TOKEN: ${{ secrets.ARGOCD_DEPLOY_TOKEN }}
