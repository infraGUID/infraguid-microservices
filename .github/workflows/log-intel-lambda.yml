name: CI - log-intel-lambda

on:
  pull_request:
    branches: [main]
    paths:
      - "services/log-intel-lambda/**"
      - ".github/workflows/log-intel-lambda.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  sast:
    uses: infraGUID/infraguid-workflows/.github/workflows/_sast.yml@main
    with:
      service-path: services/log-intel-lambda
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca:
    needs: [sast]
    uses: infraGUID/infraguid-workflows/.github/workflows/_sca.yml@main
    with:
      service-name: log-intel-lambda
      service-path: services/log-intel-lambda
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  lint:
    needs: [sca]
    uses: infraGUID/infraguid-workflows/.github/workflows/_lint.yml@main
    with:
      service-path: services/log-intel-lambda
      runtime: python

  notify-sast:
    if: ${{ always() && needs.sast.outputs.quality-gate-failed == 'true' }}
    needs: [sast]
    uses: infraGUID/infraguid-workflows/.github/workflows/_notify.yml@main
    with:
      subject: "[SAST] SonarCloud quality gate failed — log-intel-lambda"
      body: "The SonarCloud SAST quality gate failed on this pull request. Review the findings in SonarCloud before merging."
      service-name: log-intel-lambda
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

  notify-sca:
    if: ${{ always() && (needs.sca.outputs.critical-found == 'true' || needs.sca.result == 'failure') }}
    needs: [sca]
    uses: infraGUID/infraguid-workflows/.github/workflows/_notify.yml@main
    with:
      subject: "[Snyk] Critical dependency vulnerabilities — log-intel-lambda"
      body: "Snyk SCA found CRITICAL dependency vulnerabilities on this pull request. Review and remediate before merging."
      service-name: log-intel-lambda
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

  pr-comment:
    if: ${{ always() }}
    needs: [sast, sca, lint]
    uses: infraGUID/infraguid-workflows/.github/workflows/_pr-comment.yml@main
    with:
      service-name: log-intel-lambda
      sast: ${{ needs.sast.result }}
      sca: ${{ needs.sca.result }}
