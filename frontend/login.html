<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — InfraGuidAI</title>
    <meta name="description" content="Sign in to InfraGuidAI Operations Copilot" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">IG</div>
          <h1>Welcome back</h1>
          <p>Sign in to InfraGuidAI</p>
        </div>

        <div id="authError" class="auth-error"></div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@company.com" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required minlength="6" />
          </div>
          <button type="submit" id="loginBtn">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="/signup.html">Create one</a>
        </div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script>
      // Redirect if already logged in
      if (AuthManager.isLoggedIn()) {
        window.location.href = "/";
      }

      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("authError");
      const loginBtn = document.getElementById("loginBtn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.classList.remove("visible");
        loginBtn.disabled = true;
        loginBtn.textContent = "Signing in...";

        try {
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          await AuthManager.login(email, password);
          window.location.href = "/";
        } catch (err) {
          errorBox.textContent = err.message;
          errorBox.classList.add("visible");
          loginBtn.disabled = false;
          loginBtn.textContent = "Sign In";
        }
      });
    </script>
  </body>
</html>
