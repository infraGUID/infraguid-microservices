server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the chat-service. Used in local docker-compose; in EKS
    # the ALB Gateway HTTPRoute routes /api -> chat-service before traffic ever
    # reaches this pod, so this block is a no-op there but kept for parity.
    location /api/ {
        proxy_pass http://chat-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # HTML entry points must always revalidate, otherwise CloudFront (and the
    # browser) could serve a stale shell after a deploy and users would keep
    # loading old asset references. config.js is runtime config — never cache it.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }

    location = /js/config.js {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }

    # Static assets. These filenames are NOT content-hashed, so we keep a short
    # edge TTL and rely on a CloudFront invalidation on each deploy (see the
    # frontend CI workflow) to guarantee freshness.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot|map)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # SPA fallback — unknown routes return index.html (200), which carries the
    # no-cache header from the rule above once it is re-served as index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
